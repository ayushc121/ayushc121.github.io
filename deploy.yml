name: Build & Deploy Portfolio

# Runs on every push to main, and can be triggered manually
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # needed to commit portfolio.pdf back to repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install WeasyPrint system-level dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libcairo2 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation

      # 3. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # 4. Install Python dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 5. Generate portfolio.pdf from projects.json
      - name: Generate PDF
        run: python generate_pdf.py --output portfolio.pdf

      # 6. Commit the freshly generated PDF back to the repo so the
      #    "Download PDF" link in the header always points to the latest version
      - name: Commit updated PDF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.pdf
          # Only commit if the PDF actually changed
          git diff --cached --quiet || git commit -m "chore: regenerate portfolio.pdf [skip ci]"
          git push

      # 7. Configure GitHub Pages
      - name: Configure Pages
        uses: actions/configure-pages@v4

      # 8. Upload the entire repo root as the Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # 9. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
